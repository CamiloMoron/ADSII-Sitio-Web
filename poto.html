<!doctype html>

<html lang="es" class="h-full">

 <head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sistema de Gestión</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <script src="/_sdk/element_sdk.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">

  <style>

* { font-family: 'DM Sans', sans-serif; }

.mono { font-family: 'Space Mono', monospace; }

@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

@keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }

.fade-in { animation: fadeIn 0.4s ease both; }

.slide-in { animation: slideIn 0.35s ease both; }

.toast-in { animation: fadeIn 0.3s ease both; }

::-webkit-scrollbar { width:6px; }

::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

</style>

  <style>body { box-sizing: border-box; }</style>

  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

 </head>

 <body class="h-full">

  <div id="app" class="h-full w-full overflow-auto" style="background:#0f172a;">

   <!-- TOAST -->

   <div id="toast" class="fixed top-4 right-4 z-50 hidden"></div><!-- LOGIN SCREEN -->

   <div id="login-screen" class="h-full w-full flex items-center justify-center" style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);">

    <div class="fade-in w-full max-w-md mx-4">

     <!-- Logo area -->

     <div class="text-center mb-8">

      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background:#f59e0b;">

       <i data-lucide="shield-check" style="width:32px;height:32px;color:#0f172a;"></i>

      </div>

      <h1 id="login-title" class="text-2xl font-bold text-white">Sistema de Gestión</h1>

      <p id="login-subtitle" class="text-sm mt-1" style="color:#64748b;">DEMO — Prototipo funcional</p>

     </div>

     <div class="rounded-2xl p-8" style="background:#1e293b;border:1px solid #334155;">

      <form id="login-form" class="space-y-5">

       <div>

        <label for="login-user" class="block text-sm font-medium mb-2" style="color:#94a3b8;">Usuario</label>

        <div class="relative">

         <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2" style="width:18px;height:18px;color:#64748b;"></i> <input id="login-user" type="text" placeholder="Ingrese su usuario" class="w-full pl-10 pr-4 py-3 rounded-xl text-sm text-white outline-none focus:ring-2" style="background:#0f172a;border:1px solid #334155;--tw-ring-color:#f59e0b;">

        </div>

       </div>

       <div>

        <label for="login-pass" class="block text-sm font-medium mb-2" style="color:#94a3b8;">Contraseña</label>

        <div class="relative">

         <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2" style="width:18px;height:18px;color:#64748b;"></i> <input id="login-pass" type="password" placeholder="Ingrese su contraseña" class="w-full pl-10 pr-4 py-3 rounded-xl text-sm text-white outline-none focus:ring-2" style="background:#0f172a;border:1px solid #334155;--tw-ring-color:#f59e0b;">

        </div>

       </div>

       <div id="login-error" class="hidden text-sm rounded-lg p-3" style="background:#7f1d1d33;color:#fca5a5;border:1px solid #7f1d1d;">

        <span class="flex items-center gap-2"><i data-lucide="alert-circle" style="width:16px;height:16px;"></i> Credenciales incorrectas. Intente nuevamente.</span>

       </div><button type="submit" class="w-full py-3 rounded-xl text-sm font-semibold transition-all hover:brightness-110 active:scale-[0.98]" style="background:#f59e0b;color:#0f172a;"> Iniciar Sesión </button>

      </form>

      <p class="text-xs text-center mt-5" style="color:#475569;">Usuarios demo: <span class="mono" style="color:#f59e0b;">admin</span>, <span class="mono" style="color:#f59e0b;">asistente</span>, <span class="mono" style="color:#f59e0b;">supervisor</span> · Contraseña: <span class="mono" style="color:#f59e0b;">1234</span></p>

     </div>

    </div>

   </div><!-- MAIN DASHBOARD -->

   <div id="main-screen" class="h-full w-full hidden">

    <div class="flex h-full">

     <!-- SIDEBAR -->

     <aside id="sidebar" class="w-64 flex-shrink-0 flex flex-col h-full" style="background:#1e293b;border-right:1px solid #334155;">

      <div class="p-5 flex items-center gap-3" style="border-bottom:1px solid #334155;">

       <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:#f59e0b;">

        <i data-lucide="shield-check" style="width:18px;height:18px;color:#0f172a;"></i>

       </div>

       <div>

        <div id="sidebar-title" class="text-sm font-bold text-white">

         SGR

        </div>

        <div id="sidebar-company" class="text-xs" style="color:#64748b;">

         EcoResíduos SAC

        </div>

       </div>

      </div>

      <nav class="flex-1 p-3 space-y-1 overflow-auto" id="nav-menu"></nav>

      <div class="p-4" style="border-top:1px solid #334155;">

       <div class="flex items-center gap-3 mb-3">

        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold" style="background:#f59e0b;color:#0f172a;" id="avatar-initials">

         AD

        </div>

        <div>

         <div class="text-sm font-medium text-white" id="user-display">

          Admin

         </div>

         <div class="text-xs" style="color:#64748b;" id="role-display">

          Administrador

         </div>

        </div>

       </div><button onclick="logout()" class="w-full flex items-center gap-2 justify-center py-2 rounded-lg text-xs font-medium transition hover:brightness-110" style="background:#0f172a;color:#94a3b8;border:1px solid #334155;"> <i data-lucide="log-out" style="width:14px;height:14px;"></i> Cerrar Sesión </button>

      </div>

     </aside><!-- CONTENT -->

     <main class="flex-1 overflow-auto p-6" id="main-content" style="background:#0f172a;"></main>

    </div>

   </div>

  </div>

  <script>

// ---- DATA ----

const USERS = {

  admin: { pass:'1234', name:'Admin General', role:'Administrador', initials:'AG' },

  asistente: { pass:'1234', name:'María López', role:'Asistente Administrativo', initials:'ML' },

  supervisor: { pass:'1234', name:'Carlos Ruiz', role:'Supervisor de Planta', initials:'CR' },

  chofer: { pass:'1234', name:'Juan Morales', role:'Chofer', initials:'JM' },

  logistica: { pass:'1234', name:'Patricia Gómez', role:'Encargado de Logística', initials:'PG' }

};



const MENU_BY_ROLE = {

  'Administrador': [

    { id:'dashboard', icon:'layout-dashboard', label:'Dashboard' },

    { id:'catalogos', icon:'database', label:'Catálogos' },

    { id:'usuarios', icon:'users', label:'Usuarios y Perfiles' },

    { id:'ordenes-servicio', icon:'clipboard-list', label:'Órdenes de Servicio' },

    { id:'ordenes-venta', icon:'shopping-cart', label:'Órdenes de Venta' },

    { id:'facturas', icon:'file-text', label:'Facturas Electrónicas' },

    { id:'rutas', icon:'map', label:'Rutas de Recolección' },

    { id:'guias', icon:'receipt', label:'Guías de Recojo' },

    { id:'clasificacion', icon:'tag', label:'Clasificación de Material' },

    { id:'inventario', icon:'boxes', label:'Cierre de Inventario' }

  ],

  'Asistente Administrativo': [

    { id:'dashboard', icon:'layout-dashboard', label:'Dashboard' },

    { id:'catalogos', icon:'database', label:'Catálogos' },

    { id:'ordenes-servicio', icon:'clipboard-list', label:'Órdenes de Servicio' },

    { id:'ordenes-venta', icon:'shopping-cart', label:'Órdenes de Venta' },

    { id:'facturas', icon:'file-text', label:'Facturas Electrónicas' }

  ],

  'Encargado de Logística': [

    { id:'dashboard', icon:'layout-dashboard', label:'Dashboard' },

    { id:'ordenes-servicio', icon:'clipboard-list', label:'Órdenes de Servicio' },

    { id:'rutas', icon:'map', label:'Rutas de Recolección' }

  ],

  'Supervisor de Planta': [

    { id:'dashboard', icon:'layout-dashboard', label:'Dashboard' },

    { id:'catalogos', icon:'database', label:'Catálogos' },

    { id:'clasificacion', icon:'tag', label:'Clasificación de Material' },

    { id:'inventario', icon:'boxes', label:'Cierre de Inventario' }

  ],

  'Chofer': [

    { id:'dashboard', icon:'layout-dashboard', label:'Dashboard' },

    { id:'guias', icon:'receipt', label:'Guías de Recojo' }

  ]

};



let currentUser = null;

let currentView = 'dashboard';



// Sample catalog data

const catalogData = {

  clientes: [

    { id:1, nombre:'Industrias del Sur S.A.', ruc:'20100001234', contacto:'Juan Pérez', estado:'Activo' },

    { id:2, nombre:'Minera Andina Corp.', ruc:'20200005678', contacto:'Ana Torres', estado:'Activo' },

    { id:3, nombre:'Textil Norte EIRL', ruc:'20300009012', contacto:'Luis Gómez', estado:'Inactivo' }

  ],

  vehiculos: [

    { id:1, placa:'ABC-123', tipo:'Camión Baranda', capacidad:'8 Ton', estado:'Operativo' },

    { id:2, placa:'XYZ-789', tipo:'Cisterna', capacidad:'12 Ton', estado:'En Mantto.' },

    { id:3, placa:'DEF-456', tipo:'Furgón', capacidad:'5 Ton', estado:'Operativo' }

  ],

  materiales: [

    { id:1, codigo:'RES-001', nombre:'Aceite usado', tipo:'Peligroso', unidad:'Galón' },

    { id:2, codigo:'RES-002', nombre:'Cartón', tipo:'No Peligroso', unidad:'Kg' },

    { id:3, codigo:'RES-003', nombre:'Baterías plomo', tipo:'Peligroso', unidad:'Unidad' }

  ]

};



const usersData = [

  { id:1, nombre:'Admin General', usuario:'admin', rol:'Administrador', estado:'Activo' },

  { id:2, nombre:'María López', usuario:'asistente', rol:'Asistente Administrativo', estado:'Activo' },

  { id:3, nombre:'Carlos Ruiz', usuario:'supervisor', rol:'Supervisor de Planta', estado:'Activo' },

  { id:4, nombre:'Pedro Díaz', usuario:'chofer01', rol:'Chofer', estado:'Inactivo' }

];



// ---- TOAST ----

function showToast(msg, type='success') {

  const t = document.getElementById('toast');

  const colors = { success:'background:#065f46;border:1px solid #059669;color:#a7f3d0;', error:'background:#7f1d1d;border:1px solid #dc2626;color:#fca5a5;', info:'background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd;' };

  const icons = { success:'check-circle', error:'alert-circle', info:'info' };

  t.innerHTML = `<div class="toast-in flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium shadow-lg" style="${colors[type]}"><i data-lucide="${icons[type]}" style="width:16px;height:16px;"></i>${msg}</div>`;

  t.classList.remove('hidden');

  lucide.createIcons();

  setTimeout(() => t.classList.add('hidden'), 3000);

}



// ---- LOGIN ----

document.getElementById('login-form').addEventListener('submit', function(e) {

  e.preventDefault();

  const u = document.getElementById('login-user').value.trim().toLowerCase();

  const p = document.getElementById('login-pass').value;

  const err = document.getElementById('login-error');



  if (USERS[u] && USERS[u].pass === p) {

    err.classList.add('hidden');

    currentUser = { ...USERS[u], username: u };

    enterDashboard();

  } else {

    err.classList.remove('hidden');

  }

});



function enterDashboard() {

  document.getElementById('login-screen').classList.add('hidden');

  document.getElementById('main-screen').classList.remove('hidden');

  document.getElementById('user-display').textContent = currentUser.name;

  document.getElementById('role-display').textContent = currentUser.role;

  document.getElementById('avatar-initials').textContent = currentUser.initials;

  buildNav();

  navigateTo('dashboard');

}



function logout() {

  currentUser = null;

  document.getElementById('main-screen').classList.add('hidden');

  document.getElementById('login-screen').classList.remove('hidden');

  document.getElementById('login-user').value = '';

  document.getElementById('login-pass').value = '';

  document.getElementById('login-error').classList.add('hidden');

}



// ---- NAV ----

function buildNav() {

  const nav = document.getElementById('nav-menu');

  const items = MENU_BY_ROLE[currentUser.role] || MENU_BY_ROLE['Administrador'];

  nav.innerHTML = items.map(m => `

    <button onclick="navigateTo('${m.id}')" id="nav-${m.id}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all" style="color:#94a3b8;">

      <i data-lucide="${m.icon}" style="width:18px;height:18px;"></i>${m.label}

    </button>

  `).join('');

  lucide.createIcons();

}



function navigateTo(view) {

  currentView = view;

  // highlight nav

  document.querySelectorAll('#nav-menu button').forEach(b => { b.style.background='transparent'; b.style.color='#94a3b8'; });

  const active = document.getElementById('nav-'+view);

  if (active) { active.style.background='#f59e0b22'; active.style.color='#f59e0b'; }



  const c = document.getElementById('main-content');

  if (view === 'dashboard') renderDashboard(c);

  else if (view === 'catalogos') renderCatalogos(c);

  else if (view === 'usuarios') renderUsuarios(c);

  else if (view === 'ordenes-servicio') renderOrdenesServicio(c);

  else if (view === 'ordenes-venta') renderOrdenesVenta(c);

  else if (view === 'facturas') renderFacturas(c);

  else if (view === 'rutas') renderRutas(c);

  else if (view === 'guias') renderGuias(c);

  else if (view === 'clasificacion') renderClasificacion(c);

  else if (view === 'inventario') renderInventario(c);

}



// ---- DASHBOARD ----

function renderDashboard(c) {

  const stats = [

    { icon:'building-2', label:'Clientes', value: catalogData.clientes.length, color:'#3b82f6' },

    { icon:'truck', label:'Vehículos', value: catalogData.vehiculos.length, color:'#10b981' },

    { icon:'package', label:'Materiales', value: catalogData.materiales.length, color:'#8b5cf6' },

    { icon:'users', label:'Usuarios', value: usersData.length, color:'#f59e0b' }

  ];

  c.innerHTML = `

    <div class="fade-in">

      <h2 class="text-xl font-bold text-white mb-1">Bienvenido, ${currentUser.name}</h2>

      <p class="text-sm mb-6" style="color:#64748b;">Panel de control · ${currentUser.role}</p>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

        ${stats.map((s,i) => `

          <div class="slide-in rounded-xl p-5" style="background:#1e293b;border:1px solid #334155;animation-delay:${i*0.08}s;">

            <div class="flex items-center justify-between mb-3">

              <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:${s.color}22;"><i data-lucide="${s.icon}" style="width:20px;height:20px;color:${s.color};"></i></div>

              <span class="mono text-2xl font-bold text-white">${s.value}</span>

            </div>

            <span class="text-sm" style="color:#94a3b8;">${s.label} registrados</span>

          </div>

        `).join('')}

      </div>

      <div class="rounded-xl p-6" style="background:#1e293b;border:1px solid #334155;">

        <h3 class="text-sm font-semibold text-white mb-4">Accesos según perfil (CUB01)</h3>

        <div class="space-y-2">

          ${Object.entries(MENU_BY_ROLE).map(([role, menus]) => `

            <div class="flex items-center gap-3 text-sm py-2 px-3 rounded-lg" style="background:#0f172a;">

              <span class="font-medium" style="color:#f59e0b;min-width:200px;">${role}</span>

              <span style="color:#94a3b8;">→ ${menus.map(m=>m.label).join(', ')}</span>

            </div>

          `).join('')}

        </div>

      </div>

    </div>

  `;

  lucide.createIcons();

}



// ---- CATÁLOGOS (CUB02) ----

let activeCatalog = 'clientes';



function renderCatalogos(c) {

  const tabs = [

    { id:'clientes', icon:'building-2', label:'Clientes' },

    { id:'vehiculos', icon:'truck', label:'Vehículos' },

    { id:'materiales', icon:'package', label:'Materiales' }

  ];



  c.innerHTML = `

    <div class="fade-in">

      <h2 class="text-xl font-bold text-white mb-1">Catálogos del Sistema</h2>

      <p class="text-sm mb-6" style="color:#64748b;">CUB02 — Gestión de registros maestros</p>

      <div class="flex gap-2 mb-5">

        ${tabs.map(t => `

          <button onclick="switchCatalog('${t.id}')" id="tab-${t.id}" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition" style="${activeCatalog===t.id ? 'background:#f59e0b;color:#0f172a;' : 'background:#1e293b;color:#94a3b8;border:1px solid #334155;'}">

            <i data-lucide="${t.icon}" style="width:16px;height:16px;"></i>${t.label}

          </button>

        `).join('')}

      </div>

      <div class="rounded-xl overflow-hidden" style="background:#1e293b;border:1px solid #334155;">

        <div class="flex items-center justify-between p-4" style="border-bottom:1px solid #334155;">

          <span class="text-sm font-semibold text-white" id="catalog-count"></span>

          <button onclick="openNewForm()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold transition hover:brightness-110" style="background:#f59e0b;color:#0f172a;">

            <i data-lucide="plus" style="width:16px;height:16px;"></i>Nuevo Registro

          </button>

        </div>

        <div id="catalog-table" class="overflow-x-auto"></div>

      </div>

      <div id="new-form-overlay" class="hidden fixed inset-0 z-40 flex items-center justify-center" style="background:rgba(0,0,0,0.6);">

        <div class="w-full max-w-lg mx-4 rounded-2xl p-6 fade-in" style="background:#1e293b;border:1px solid #334155;" id="new-form-content"></div>

      </div>

    </div>

  `;

  renderCatalogTable();

  lucide.createIcons();

}



function switchCatalog(id) {

  activeCatalog = id;

  renderCatalogos(document.getElementById('main-content'));

}



function renderCatalogTable() {

  const data = catalogData[activeCatalog];

  document.getElementById('catalog-count').textContent = `${data.length} registros`;

  const headers = { clientes:['ID','Nombre','RUC','Contacto','Estado'], vehiculos:['ID','Placa','Tipo','Capacidad','Estado'], materiales:['ID','Código','Nombre','Tipo','Unidad'] };

  const keys = { clientes:['id','nombre','ruc','contacto','estado'], vehiculos:['id','placa','tipo','capacidad','estado'], materiales:['id','codigo','nombre','tipo','unidad'] };

  const h = headers[activeCatalog];

  const k = keys[activeCatalog];



  const statusColor = v => {

    const lc = (v||'').toLowerCase();

    if (lc==='activo'||lc==='operativo') return 'background:#065f4622;color:#34d399;border:1px solid #065f46;';

    if (lc==='inactivo'||lc.includes('mantto')) return 'background:#7f1d1d22;color:#fca5a5;border:1px solid #7f1d1d;';

    if (lc==='peligroso') return 'background:#7f1d1d22;color:#fca5a5;border:1px solid #7f1d1d;';

    return 'background:#1e3a5f22;color:#93c5fd;border:1px solid #1e3a5f;';

  };



  document.getElementById('catalog-table').innerHTML = `

    <table class="w-full text-sm">

      <thead><tr style="background:#0f172a;">

        ${h.map(col => `<th class="px-4 py-3 text-left font-medium" style="color:#64748b;">${col}</th>`).join('')}

      </tr></thead>

      <tbody>

        ${data.map(row => `<tr class="transition hover:bg-white/5" style="border-top:1px solid #334155;">

          ${k.map(key => {

            const val = row[key];

            const isStatus = key==='estado'||key==='tipo';

            return `<td class="px-4 py-3 text-white">${isStatus ? `<span class="inline-block px-2 py-0.5 rounded-md text-xs font-medium" style="${statusColor(val)}">${val}</span>` : val}</td>`;

          }).join('')}

        </tr>`).join('')}

      </tbody>

    </table>

  `;

}



function openNewForm() {

  const overlay = document.getElementById('new-form-overlay');

  const content = document.getElementById('new-form-content');

  const fields = {

    clientes: [{l:'Nombre',k:'nombre'},{l:'RUC',k:'ruc'},{l:'Contacto',k:'contacto'}],

    vehiculos: [{l:'Placa',k:'placa'},{l:'Tipo',k:'tipo'},{l:'Capacidad',k:'capacidad'}],

    materiales: [{l:'Código',k:'codigo'},{l:'Nombre',k:'nombre'},{l:'Tipo',k:'tipo'},{l:'Unidad',k:'unidad'}]

  };

  const f = fields[activeCatalog];

  const title = { clientes:'Cliente', vehiculos:'Vehículo', materiales:'Material' }[activeCatalog];



  content.innerHTML = `

    <h3 class="text-lg font-bold text-white mb-4">Nuevo ${title}</h3>

    <form id="catalog-new-form" class="space-y-4">

      ${f.map(fi => `

        <div>

          <label class="block text-sm font-medium mb-1" style="color:#94a3b8;">${fi.l}</label>

          <input name="${fi.k}" required class="w-full px-3 py-2.5 rounded-lg text-sm text-white outline-none focus:ring-2" style="background:#0f172a;border:1px solid #334155;--tw-ring-color:#f59e0b;" placeholder="Ingrese ${fi.l.toLowerCase()}">

        </div>

      `).join('')}

      <div id="dup-error" class="hidden text-sm rounded-lg p-3" style="background:#7f1d1d33;color:#fca5a5;border:1px solid #7f1d1d;">

        <span class="flex items-center gap-2"><i data-lucide="alert-circle" style="width:16px;height:16px;"></i> Registro duplicado detectado.</span>

      </div>

      <div class="flex gap-3 pt-2">

        <button type="submit" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition hover:brightness-110" style="background:#f59e0b;color:#0f172a;">Guardar</button>

        <button type="button" onclick="closeNewForm()" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition" style="background:#334155;color:#94a3b8;">Cancelar</button>

      </div>

    </form>

  `;

  overlay.classList.remove('hidden');

  lucide.createIcons();



  document.getElementById('catalog-new-form').addEventListener('submit', function(e) {

    e.preventDefault();

    const fd = new FormData(this);

    const obj = Object.fromEntries(fd);

    // Check duplicates (CUB02 alt flow)

    const data = catalogData[activeCatalog];

    const dupKey = activeCatalog==='vehiculos' ? 'placa' : activeCatalog==='clientes' ? 'ruc' : 'codigo';

    if (data.some(d => d[dupKey]?.toLowerCase() === obj[dupKey]?.toLowerCase())) {

      document.getElementById('dup-error').classList.remove('hidden');

      return;

    }

        <button type="submit" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition hover:brightness-110" style="background:#f59e0b;color:#0f172a;">Cerrar Lote</button>

        <button type="button" onclick="document.getElementById('inventario-form-overlay').classList.add('hidden')" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition" style="background:#334155;color:#94a3b8;">Cancelar</button>

      </div>

    </form>

  `;

  overlay.classList.remove('hidden');

  

  const pesoBrutoInput = document.querySelector('input[name="pesoBruto"]');

  const pesoFinalInput = document.querySelector('input[name="pesoFinal"]');

  

  const calcMerma = () => {

    const bruto = parseFloat(pesoBrutoInput.value) || 0;

    const final = parseFloat(pesoFinalInput.value) || 0;

    const merma = bruto - final;

    document.getElementById('merma-calc').textContent = `${merma} Kg`;

  };

  

  pesoBrutoInput?.addEventListener('input', calcMerma);

  pesoFinalInput?.addEventListener('input', calcMerma);

  

  lucide.createIcons();



  document.getElementById('inventario-new-form').addEventListener('submit', function(e) {

    e.preventDefault();

    const fd = new FormData(this);

    const bruto = parseInt(fd.get('pesoBruto')) || 0;

    const final = parseInt(fd.get('pesoFinal')) || 0;

    const obj = {

      id: inventario_lotes.length + 1,

      lote: `LOT-${String(inventario_lotes.length + 1).padStart(3,'0')}`,

      material: fd.get('material'),

      pesoBruto: bruto + ' Kg',

      pesoFinal: final + ' Kg',

      merma: (bruto - final) + ' Kg',

      zona: fd.get('zona'),

      estado: 'Cerrado',

      supervisor: currentUser.name

    };

    inventario_lotes.push(obj);

    document.getElementById('inventario-form-overlay').classList.add('hidden');

    renderInventario(document.getElementById('main-content'));

    showToast(`Lote ${obj.lote} cerrado y stock actualizado`);

  });

}
